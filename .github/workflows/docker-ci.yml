name: Docker Build and Integrity CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_minimal.txt
          pip install pytest

      - name: Run recommender tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/test_recommender.py -q

  docker-integrity:
    name: Docker Build Integrity
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (CI local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: mlops-project/backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (CI local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.streamlit
          push: false
          load: true
          tags: mlops-project/frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test backend container
        run: |
          docker run -d --name backend-ci -p 8001:8001 \
            -e WANDB_MODE=disabled \
            -e MLFLOW_TRACKING_URI=file:/app/mlruns \
            -e MLFLOW_BACKEND_STORE_URI=file:/app/mlruns \
            -e MLFLOW_ARTIFACT_ROOT=/app/mlruns \
            mlops-project/backend:ci

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8001/health >/dev/null; then
              echo "Backend health check passed"
              break
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:8001/health
          docker logs backend-ci --tail 200

      - name: Smoke test frontend container
        run: |
          docker run -d --name frontend-ci -p 8501:8501 \
            -e API_URL=http://127.0.0.1:8001 \
            mlops-project/frontend:ci

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8501 >/dev/null; then
              echo "Frontend startup check passed"
              break
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:8501 >/dev/null
          docker logs frontend-ci --tail 200

      - name: Cleanup containers
        if: always()
        run: |
          docker rm -f frontend-ci backend-ci 2>/dev/null || true

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mlops-project-backend:latest
            ghcr.io/${{ github.repository_owner }}/mlops-project-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push frontend image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.streamlit
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mlops-project-frontend:latest
            ghcr.io/${{ github.repository_owner }}/mlops-project-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
