name: Docker Build and Integrity CI

on:
  pull_request:
  push:
    branches:
      - main
      - feature/dvc-dataset-ci
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_minimal.txt
          pip install pytest

      - name: Run recommender tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/test_recommender.py -q

  docker-integrity:
    name: Docker Build Integrity
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install DVC
        run: |
          python -m pip install --upgrade pip
          pip install dvc dvc-s3

      - name: Cache Dataset via DVC
        id: dvc-cache
        uses: actions/cache@v3
        with:
          path: datasets/high_resolution_viton_zalando
          key: ${{ runner.os }}-dvc-dataset-${{ hashFiles('datasets/high_resolution_viton_zalando.dvc') }}
          restore-keys: |
            ${{ runner.os }}-dvc-dataset-

      - name: Pull Dataset via DVC (DagsHub S3)
        if: steps.dvc-cache.outputs.cache-hit != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DAGSHUB_TOKEN }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          dvc pull -r origin

      - name: Build backend image (CI local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: mlops-project/backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (CI local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.streamlit
          push: false
          load: true
          tags: mlops-project/frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Docker Network
        run: docker network create test-net

      - name: Smoke test backend container
        run: |
          docker run -d --name backend-ci --network test-net -p 8001:8001 \
            -e WANDB_MODE=disabled \
            -e MLFLOW_TRACKING_URI=file:/app/mlruns \
            -e MLFLOW_BACKEND_STORE_URI=file:/app/mlruns \
            -e MLFLOW_ARTIFACT_ROOT=/app/mlruns \
            -e RECOMMENDER_DATASET_DIR=/app/datasets/high_resolution_viton_zalando/test/cloth \
            -e TRYON_TRAIN_DATASET_DIR=/app/datasets/high_resolution_viton_zalando/train/cloth \
            -v ${{ github.workspace }}/datasets:/app/datasets:ro \
            mlops-project/backend:ci

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8001/health >/dev/null; then
              echo "Backend health check passed"
              break
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:8001/health || true
          docker logs backend-ci --tail 200

      - name: Smoke test frontend container
        run: |
          docker run -d --name frontend-ci --network test-net -p 8501:8501 \
            -e API_URL=http://backend-ci:8001 \
            mlops-project/frontend:ci

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8501 >/dev/null; then
              echo "Frontend startup check passed"
              break
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:8501 >/dev/null
          docker logs frontend-ci --tail 200

      - name: Cleanup containers
        if: always()
        run: |
          docker rm -f frontend-ci backend-ci 2>/dev/null || true
          docker network rm test-net 2>/dev/null || true

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend image to GHCR
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/mlops-project-backend:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/mlops-project-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push frontend image to GHCR
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.streamlit
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/mlops-project-frontend:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/mlops-project-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Keep last 2 backend images in GHCR
        if: github.event_name == 'push'
        uses: actions/delete-package-versions@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          package-name: mlops-project-backend
          package-type: container
          min-versions-to-keep: 2
          delete-only-untagged-versions: true

      - name: Keep last 2 frontend images in GHCR
        if: github.event_name == 'push'
        uses: actions/delete-package-versions@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          package-name: mlops-project-frontend
          package-type: container
          min-versions-to-keep: 2
          delete-only-untagged-versions: true
