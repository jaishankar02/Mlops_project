version: '3.8'

services:
  # FastAPI Backend
  backend:
    build: .
    container_name: stylesync-backend
    command: python -m uvicorn backend.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - DEBUG=False
      - PYTHONPATH=/app
      - MLFLOW_TRACKING_URI=file:/app/mlruns
      - MLFLOW_BACKEND_STORE_URI=file:/app/mlruns
      - MLFLOW_ARTIFACT_ROOT=/app/mlruns
      - WANDB_MODE=disabled
      - LOG_LEVEL=INFO
      - RECOMMENDER_DATASET_DIR=/app/datasets/high_resolution_viton_zalando/test/cloth
      - TRYON_TRAIN_DATASET_DIR=/app/datasets/high_resolution_viton_zalando/train/cloth
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
      - backend_mlruns:/app/mlruns
      - ./datasets:/app/datasets:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - stylesync-network
    restart: unless-stopped

  # Streamlit Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: stylesync-frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8001
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - stylesync-network
    restart: unless-stopped

networks:
  stylesync-network:
    driver: bridge

volumes:
  backend_data:
  backend_logs:
  backend_mlruns:
